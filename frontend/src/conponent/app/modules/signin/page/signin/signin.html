<div class="flex-column-center-center full-height">
  <div class="flex-column gap container">
    <tc-banner>Sign In</tc-banner>
    <tc-input type="email" title="email" [(value)]="email"/>
    <tc-input type="password" title="Password" [(value)]="password"/>
    <tc-button variant="secondary" (onClick)="onSignin()">Sign In</tc-button>
    <tc-button (onClick)="onRedirect()">Sign Up</tc-button>
  </div>
</div>
