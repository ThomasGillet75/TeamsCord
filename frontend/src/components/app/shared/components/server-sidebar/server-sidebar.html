<aside class="server-sidebar">
  <div class="server-list gap">
    @for (server of servers(); track server.id) {
      <tc-server-item
        [name]="server.name"
        [isSelected]="selectedServer()?.id === server.id"
        (onSelect)="onSelectServer.emit(server)"
      />
    }
  </div>
  <div class="sidebar-add gap">
    <input
      type="text"
      placeholder="Nouveau serveur"
      [value]="newServerName"
      (input)="onServerNameInput($event)"
      (keydown.enter)="onCreateServer()"
    />
    <tc-button variant="secondary" (click)="onCreateServer()">Ajouter</tc-button>
    <tc-add-icon/>
  </div>
</aside>

<tc-modal>
  <form class="server-config gap" (submit)="onClick(); $event.preventDefault()">
    <button class="close-button" onClick="onClose()">x</button>
    <tc-input variant="secondary" title="Server Name" [(value)]="serverName"/>
    <tc-button>Save Changes</tc-button>
  </form>
</tc-modal>
