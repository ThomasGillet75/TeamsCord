<div class="flex-column-center-center full-height">
  <tc-banner>Sign UP</tc-banner>
  <tc-background-shader/>
  <div class="flex-column gap-s container">
    <tc-input title="Username" [(value)]="username"/>
    <tc-input type="email" title="Email" [(value)]="email"/>
    <tc-input type="password" title="Password" [(value)]="password"/>
    <tc-input type="password" title="Verify Password" [(value)]="verifyPassword"/>
    <tc-button (onClick)="onSignUp()">Sign Up</tc-button>
  </div>
</div>
